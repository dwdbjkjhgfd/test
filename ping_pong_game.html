<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ping Pong Game by Kevin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b7e3b;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .wrap {
      text-align: center;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }
    p {
      margin-top: 0;
      color: #ccc;
    }
    canvas {
      background: #000;
      border: 3px solid #fff;
      display: block;
      margin: 16px auto 10px;
    }
    .score {
      font-size: 22px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Ping Pong game by Kevin</h1>
    <p>Use W/S for the left paddle and ↑/↓ for the right paddle</p>
    <canvas id="game" width="800" height="500"></canvas>
    <div class="score" id="score">0 : 0</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    const paddleWidth = 12;
    const paddleHeight = 100;
    const paddleSpeed = 7;
    const ballSize = 12;

    const leftPaddle = {
      x: 20,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      dy: 0,
      score: 0
    };

    const rightPaddle = {
      x: canvas.width - 20 - paddleWidth,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      dy: 0,
      score: 0
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      size: ballSize,
      speed: 5,
      dx: 5,
      dy: 3
    };

    function resetBall(direction = 1) {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.dx = ball.speed * direction;
      ball.dy = (Math.random() * 4 - 2) || 2;
    }

    function updateScore() {
      scoreEl.textContent = `${leftPaddle.score} : ${rightPaddle.score}`;
    }

    function drawRect(x, y, w, h) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(x, y, w, h);
    }

    function drawBall() {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawCenterLine() {
      ctx.setLineDash([10, 10]);
      ctx.strokeStyle = '#666';
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function movePaddles() {
      leftPaddle.y += leftPaddle.dy;
      rightPaddle.y += rightPaddle.dy;

      leftPaddle.y = Math.max(0, Math.min(canvas.height - leftPaddle.height, leftPaddle.y));
      rightPaddle.y = Math.max(0, Math.min(canvas.height - rightPaddle.height, rightPaddle.y));
    }

    function moveBall() {
      ball.x += ball.dx;
      ball.y += ball.dy;

      if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
        ball.dy *= -1;
      }

      if (
        ball.x - ball.size < leftPaddle.x + leftPaddle.width &&
        ball.y > leftPaddle.y &&
        ball.y < leftPaddle.y + leftPaddle.height
      ) {
        ball.dx = Math.abs(ball.dx);
        const collidePoint = ball.y - (leftPaddle.y + leftPaddle.height / 2);
        ball.dy = collidePoint * 0.15;
      }

      if (
        ball.x + ball.size > rightPaddle.x &&
        ball.y > rightPaddle.y &&
        ball.y < rightPaddle.y + rightPaddle.height
      ) {
        ball.dx = -Math.abs(ball.dx);
        const collidePoint = ball.y - (rightPaddle.y + rightPaddle.height / 2);
        ball.dy = collidePoint * 0.15;
      }

      if (ball.x < 0) {
        rightPaddle.score += 1;
        updateScore();
        resetBall(-1);
      }

      if (ball.x > canvas.width) {
        leftPaddle.score += 1;
        updateScore();
        resetBall(1);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawCenterLine();
      drawRect(leftPaddle.x, leftPaddle.y, leftPaddle.width, leftPaddle.height);
      drawRect(rightPaddle.x, rightPaddle.y, rightPaddle.width, rightPaddle.height);
      drawBall();
    }

    function gameLoop() {
      movePaddles();
      moveBall();
      draw();
      requestAnimationFrame(gameLoop);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'w' || e.key === 'W') leftPaddle.dy = -paddleSpeed;
      if (e.key === 's' || e.key === 'S') leftPaddle.dy = paddleSpeed;
      if (e.key === 'ArrowUp') rightPaddle.dy = -paddleSpeed;
      if (e.key === 'ArrowDown') rightPaddle.dy = paddleSpeed;
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'w' || e.key === 'W' || e.key === 's' || e.key === 'S') leftPaddle.dy = 0;
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown') rightPaddle.dy = 0;
    });

    updateScore();
    resetBall(Math.random() > 0.5 ? 1 : -1);
    gameLoop();
  </script>
</body>
</html>
